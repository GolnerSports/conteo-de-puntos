name: Auto Results - GOLNER SPORTS

on:
  # El scheduler de GitHub Actions tiene retrasos impredecibles.
  # Ahora cron-job.org dispara este workflow via workflow_dispatch cada 5 min.
  workflow_dispatch:
    # Disparado por cron-job.org cada 5 minutos (confiable) o manualmente

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore Firestore cache
        uses: actions/cache@v4
        with:
          path: scripts/firestore-cache.json
          key: firestore-cache-${{ github.run_id }}
          restore-keys: |
            firestore-cache-

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run auto-results script
        env:
          SA_PRIVATE_KEY_ID: ${{ secrets.SA_PRIVATE_KEY_ID }}
          SA_PRIVATE_KEY:    ${{ secrets.SA_PRIVATE_KEY }}
          SA_CLIENT_EMAIL:   ${{ secrets.SA_CLIENT_EMAIL }}
          SA_CLIENT_ID:      ${{ secrets.SA_CLIENT_ID }}
          VAPID_KEY:         ${{ secrets.VAPID_KEY }}
        run: node scripts/auto-results.js
