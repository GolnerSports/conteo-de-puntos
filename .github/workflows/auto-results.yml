name: Auto Results - GOLNER SPORTS

on:
  schedule:
    # Corre cada 5 minutos durante horas de partidos (12:00 - 04:00 UTC)
    # Mundial 2026: partidos entre 17:00-02:00 hora México (22:00-07:00 UTC)
    - cron: '*/5 22-23 * * *'
    - cron: '*/5 0-7 * * *'
    # También a mediodía por si hay partidos tempranos
    - cron: '*/5 17-21 * * *'
  workflow_dispatch:
    # Permite correrlo manualmente desde GitHub

jobs:
  update-results:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run auto-results script
        env:
          SA_PRIVATE_KEY_ID: ${{ secrets.SA_PRIVATE_KEY_ID }}
          SA_PRIVATE_KEY:    ${{ secrets.SA_PRIVATE_KEY }}
          SA_CLIENT_EMAIL:   ${{ secrets.SA_CLIENT_EMAIL }}
          SA_CLIENT_ID:      ${{ secrets.SA_CLIENT_ID }}
          VAPID_KEY:         ${{ secrets.VAPID_KEY }}
        run: node scripts/auto-results.js
